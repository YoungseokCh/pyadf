version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
    rust: "latest"
  commands:
    - pip install maturin
    - maturin build --release --out dist
    - pip install dist/*.whl
    - pip install sphinx furo sphinx-copybutton myst-parser
    - sphinx-build -b html docs/ $READTHEDOCS_OUTPUT/html/

sphinx:
  configuration: docs/conf.py
